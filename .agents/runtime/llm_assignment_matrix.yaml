# ═══════════════════════════════════════════
# Restricciones negativas por LLM
# ═══════════════════════════════════════════

restrictions:
  codex:
    never_touch:
      - server/app.ts (auth routes, middleware)
      - server/auth.ts
      - server/paypal-subscriptions.ts
      - server/credit-ledger.ts
      - package.json (dependencies section)
      - prisma/schema.prisma
    reason: "Historial de incidentes: eliminación de Google OAuth, movimiento de React a peerDeps (2026-04-03)"

  openai-gpt:
    never_touch:
      - server/app.ts (core routes)
      - server/middleware/**
      - prisma/migrations/**
    reason: "Mismo equipo que Codex. Backend profundo y migraciones deben ser lideradas por Gemini o Claude"

  gemini:
    avoid_leading:
      - copy visible al usuario final
      - pricing/marketing claims
      - i18n text content
    reason: "Gemini es fuerte en backend/infra pero el copy visible requiere sensibilidad de producto"

  claude:
    restrictions: none
    note: "Mejor track record de seguridad en este proyecto. Sin restricciones de zona."
