# ──────────────────────────────────────────────────────────────────────────────
# Vorea Studio — Local Development Database
# ──────────────────────────────────────────────────────────────────────────────
#
# Usage:
#   docker compose up -d          → Start PostgreSQL + pgAdmin
#   docker compose down           → Stop
#   docker compose down -v        → Stop + remove data volumes
#
# After starting:
#   npx prisma db push            → Apply schema to local DB
#   npx prisma studio             → Visual data browser at http://localhost:5555
#   pgAdmin:                      → http://localhost:5050 (admin@vorea.studio / vorea2026)
#
# ──────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: vorea_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vorea
      POSTGRES_PASSWORD: vorea_dev
      POSTGRES_DB: vorea_studio
    ports:
      - "5432:5432"
    volumes:
      - vorea_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vorea -d vorea_studio"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vorea_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vorea.studio
      PGADMIN_DEFAULT_PASSWORD: vorea2026
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  vorea_pgdata:
    name: vorea_studio_pgdata
