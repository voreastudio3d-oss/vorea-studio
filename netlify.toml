# ═══════════════════════════════════════════════════════════════
# Netlify configuration — temporary reverse proxy bridge
# During BG-108 cutover, root traffic is proxied to the Railway
# Node runtime exposed behind api.voreastudio3d.com.
# ═══════════════════════════════════════════════════════════════

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  VITE_API_URL = "/api"
  # Set FRONTEND_URL in Netlify UI for production so generated
  # robots/sitemap/canonical assets use the custom domain.

[context.production.environment]
  FRONTEND_URL = "https://voreastudio3d.com"

# ─── Temporary bridge: same-origin API stays canonical ────────
[[redirects]]
  from = "/api/*"
  to = "https://api.voreastudio3d.com/api/:splat"
  status = 200
  force = true

# Bridge every non-API request to the Railway Node runtime.
# This makes voreastudio3d.com serve the Node app behavior
# without waiting for final DNS/dashboard cutover.
[[redirects]]
  from = "/*"
  to = "https://api.voreastudio3d.com/:splat"
  status = 200
  force = true
